name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    name: Script quality checks
    uses: ./.github/workflows/checks.yml

  lintian:
    name: Lintian + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install lintian
        run: sudo apt-get install -y lintian
      - name: Build package
        run: make build
      - name: Run lintian
        run: lintian baize-kube_*.deb || true

  test:
    name: Test (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run tests
        run: bats test/

  docs:
    name: Documentation checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check all doc links are valid files
        run: |
          errors=0
          for f in doc/*.md; do
            while read -r link; do
              target="doc/$(basename "$link")"
              if [ ! -f "$target" ]; then
                echo "Broken link in $f: $link -> $target (not found)"
                errors=1
              fi
            done < <(grep -oP '\[.*?\]\(\.\.?/[^)]+\)' "$f" | sed 's/.*(\(.*\))/\1/')
          done
          exit $errors

      - name: Check README doc table is complete
        run: |
          doc_count=$(ls doc/*.md | wc -l)
          table_count=$(grep -c 'doc/0' README.md)
          echo "doc/ files: $doc_count, README table entries: $table_count"
